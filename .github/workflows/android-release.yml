name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build and publish release APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Prepare release APK
        run: |
          set -euo pipefail
          mkdir -p dist
          APK_PATH="$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          cp "$APK_PATH" "dist/Sploot-${GITHUB_REF_NAME}.apk"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sploot-release-apk
          path: dist/Sploot-${{ github.ref_name }}.apk
          if-no-files-found: error

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" "dist/Sploot-${GITHUB_REF_NAME}.apk" \
            --title "Sploot ${GITHUB_REF_NAME}" \
            --generate-notes
